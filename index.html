<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Samarth Desai — Cyber Security Graduate & SOC Analyst. First Class Honours. Built KeyWatch: real-time keystroke anomaly detection with 92% precision.">
<title>Samarth Desai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>

/* ─── Reset ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

/* ─── Tokens ─── */
:root {
  --bg:       #faf9f7;
  --text:     #1a1917;
  --muted:    #72706b;
  --faint:    #a8a69f;
  --border:   rgba(0,0,0,0.09);
  --tag-bg:   #f0ede7;
  --tag-text: #4a483f;
  --serif: 'Lora', Georgia, serif;
  --sans:  'Inter', system-ui, sans-serif;
  --p: clamp(1.5rem, 7vw, 5rem);   /* side padding — matches ref feel */
}

[data-theme="dark"] {
  --bg:       #111110;
  --text:     #edeae3;
  --muted:    #8a877f;
  --faint:    #5a5750;
  --border:   rgba(255,255,255,0.08);
  --tag-bg:   #1d1c1a;
  --tag-text: #b0ada5;
}

/* ─── Base ─── */
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.75;
  -webkit-font-smoothing: antialiased;
  transition: background .35s, color .35s;
}

/* ─── Every section just uses padding — no max-width wrapper ─── */
.section {
  padding: 4rem var(--p);
  border-top: 1px solid var(--border);
}

/* ─── Top bar ─── */
.topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.75rem var(--p) 0;
}

.wordmark {
  font-family: var(--serif);
  font-style: italic;
  font-size: 1.0625rem;
  color: var(--text);
  text-decoration: none;
  transition: opacity .2s;
}
.wordmark:hover { opacity: .6; }

.theme-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1.1rem;
  color: var(--muted);
  padding: .25rem .5rem;
  transition: color .2s;
  line-height: 1;
}
.theme-btn:hover { color: var(--text); }

/* ─── Hero ─── */
.hero {
  padding: 5rem var(--p) 4.5rem;
}

h1 {
  font-family: var(--serif);
  font-size: clamp(1.9rem, 4vw, 2.8rem);
  font-weight: 400;
  line-height: 1.3;
  letter-spacing: -.015em;
  color: var(--text);
  margin-bottom: 1.25rem;
  max-width: 820px;
}

.tagline {
  font-size: 1rem;
  color: var(--muted);
  line-height: 1.8;
  max-width: 620px;
  font-weight: 300;
}

/* ─── Section heading ─── */
h2 {
  font-family: var(--serif);
  font-size: 1.45rem;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 2rem;
  letter-spacing: -.01em;
}

/* ─── Body prose ─── */
.prose {
  font-size: .9375rem;
  color: var(--muted);
  line-height: 1.85;
  font-weight: 300;
  max-width: 720px;
}
.prose + .prose { margin-top: 1rem; }

/* ─── List items (work / projects / edu) ─── */
.list { display: flex; flex-direction: column; }

.item {
  padding: 1.5rem 0;
  border-bottom: 1px solid var(--border);
  opacity: 0;
  transform: translateY(16px);
  transition: opacity .55s ease, transform .55s ease;
}
.item:first-child { border-top: 1px solid var(--border); }
.item.in { opacity: 1; transform: none; }

.item-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  flex-wrap: wrap;
  gap: .4rem 1.5rem;
  margin-bottom: .45rem;
}

.item-title {
  font-size: .9375rem;
  font-weight: 500;
  color: var(--text);
}

.item-meta {
  font-size: .8125rem;
  color: var(--faint);
  font-weight: 300;
  white-space: nowrap;
}

.item-body {
  font-size: .9rem;
  color: var(--muted);
  line-height: 1.8;
  font-weight: 300;
  max-width: 800px;
}

/* ─── Tags ─── */
.tags {
  display: flex;
  flex-wrap: wrap;
  gap: .3rem;
  margin-top: .65rem;
}
.tag {
  font-size: .72rem;
  background: var(--tag-bg);
  color: var(--tag-text);
  padding: .18rem .55rem;
  border-radius: 4px;
  font-weight: 400;
  letter-spacing: .01em;
}

/* ─── Project name in serif ─── */
.proj-name {
  font-family: var(--serif);
  font-size: 1.05rem;
  font-weight: 400;
  color: var(--text);
}

/* ─── Stats ─── */
.stats {
  display: flex;
  flex-wrap: wrap;
  gap: .75rem 2.5rem;
  margin: 1rem 0;
}
.stat { display: flex; flex-direction: column; gap: .1rem; }
.stat-n {
  font-family: var(--serif);
  font-size: 1.6rem;
  font-weight: 400;
  color: var(--text);
  line-height: 1;
}
.stat-l {
  font-size: .75rem;
  color: var(--faint);
  font-weight: 300;
}

/* ─── Project image ─── */
.proj-img {
  margin: 1.25rem 0 .75rem;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.proj-img img { width: 100%; height: auto; display: block; }
.proj-img-cap {
  font-size: .75rem;
  color: var(--faint);
  padding: .45rem .75rem;
  background: var(--tag-bg);
  font-style: italic;
}

/* ─── Education ─── */
.edu-degree {
  font-size: .9375rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: .2rem;
}
.edu-where {
  font-size: .875rem;
  color: var(--muted);
  font-weight: 300;
  margin-bottom: .6rem;
}

/* ─── Skills grid ─── */
.skills-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 2rem 3rem;
}
.sg-label {
  font-size: .7rem;
  font-weight: 500;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--faint);
  margin-bottom: .6rem;
}
.sg-list {
  display: flex;
  flex-direction: column;
  gap: .3rem;
}
.sg-list span {
  font-size: .875rem;
  color: var(--muted);
  font-weight: 300;
}

/* ─── Connect (bottom) ─── */
.connect {
  padding: 4rem var(--p) 5.5rem;
  border-top: 1px solid var(--border);
}
.connect h2 { margin-bottom: .75rem; }
.connect-blurb {
  font-size: .9375rem;
  color: var(--muted);
  line-height: 1.8;
  font-weight: 300;
  max-width: 580px;
  margin-bottom: 2rem;
}
.connect-links {
  display: flex;
  flex-wrap: wrap;
  gap: .25rem 0;
}
.connect-links a {
  font-size: 1rem;
  color: var(--text);
  text-decoration: underline;
  text-decoration-color: var(--border);
  text-underline-offset: 4px;
  font-weight: 400;
  margin-right: 1.75rem;
  transition: text-decoration-color .2s, opacity .2s;
}
.connect-links a:hover {
  text-decoration-color: var(--text);
  opacity: .7;
}
.copy {
  margin-top: 4rem;
  font-size: .8125rem;
  color: var(--faint);
}

/* ─── Reveal base ─── */
.reveal {
  opacity: 0;
  transform: translateY(16px);
  transition: opacity .6s ease, transform .6s ease;
}
.reveal.in { opacity: 1; transform: none; }

/* ─── Mobile ─── */
@media (max-width: 540px) {
  .item-head { flex-direction: column; gap: .1rem; }
  .skills-grid { grid-template-columns: 1fr 1fr; }
  .stats { gap: .75rem 1.5rem; }
}

</style>
</head>
<body data-theme="light">

<!-- Top bar -->
<div class="topbar">
  <a class="wordmark" href=" style="font-size: 1.5rem; font-weight: 800;">sd.</a>
